apiVersion: apps/v1
kind: Deployment
metadata:
  name: frigo-backend
  namespace: frigo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frigo-backend
  template:
    metadata:
      labels:
        app: frigo-backend
    spec:
      imagePullSecrets:
        - name: dockerhub-secret

      containers:
        - name: backend
          image: ferjani90/frigo_backend:latest
          ports:
            - containerPort: 3001

          env:
            - name: DB_HOST
              value: "85.215.215.242"
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: "frigo_db"
            - name: DB_USER
              value: "admin "
            - name: DB_PASSWORD
              value: "admin123"
