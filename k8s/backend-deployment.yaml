apiVersion: apps/v1
kind: Deployment
metadata:
  name: frigo-backend
  namespace: frigo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frigo-backend
  template:
    metadata:
      labels:
        app: frigo-backend
    spec:
      imagePullSecrets:
        - name: dockerhub-secret

      containers:
        - name: backend
          image: ferjani90/frigo_backend:latest
          ports:
            - containerPort: 30001
